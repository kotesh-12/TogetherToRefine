<!DOCTYPE html>
<html>

<head></head>

<body>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script>
        async function test() {
            try {
                const pres = new PptxGenJS();
                let slide = pres.addSlide();
                const imageUrl = "https://image.pollinations.ai/prompt/cat?width=800&height=600&nologo=true";

                const base64data = await new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            resolve(canvas.toDataURL('image/jpeg', 0.9));
                        } catch (e) { reject(e); }
                    };
                    img.onerror = () => reject(new Error('Failed to load image into canvas'));
                    img.src = imageUrl;
                });

                slide.addImage({ data: base64data, x: 1, y: 1, w: 4, h: 4 });
                await pres.writeFile({ fileName: 'TestOutput.pptx' });
                document.body.innerHTML += "<h1 id='success'>SUCCESS</h1>"
            } catch (e) {
                document.body.innerHTML += "<h1 id='error'>" + e.message + "</h1>"
            }
        }
        test();
    </script>
</body>

</html>
