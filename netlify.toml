[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Extend timeout for AI API calls (default is 10s, max 26s on free tier)
[functions."chat"]
  timeout = 26

# SPA — send all non-file routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
