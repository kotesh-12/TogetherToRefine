<!DOCTYPE html>
<html>

<head></head>

<body>
    <img id="test" crossorigin="Anonymous"
        src="https://api.allorigins.win/raw?url=https%3A%2F%2Fimage.pollinations.ai%2Fprompt%2Fcat" />
    <script>
        setTimeout(() => {
            try {
                const img = document.getElementById('test');
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                canvas.toDataURL('image/jpeg');
                document.body.innerHTML += "<h1 id='success'>SUCCESS</h1>";
            } catch (e) {
                document.body.innerHTML += "<h1 id='error'>" + e.message + "</h1>";
            }
        }, 3000);
    </script>
</body>

</html>
