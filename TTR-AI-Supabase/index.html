<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* Immediate Loading State */
    #root-loading {
      position: fixed;
      inset: 0;
      background: #0f0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Inter', system-ui, sans-serif;
      color: #6C63FF;
    }

    .root-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(108, 99, 255, 0.1);
      border-top: 3px solid #6C63FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error-display {
      display: none;
      position: fixed;
      inset: 20px;
      z-index: 10000;
      background: #1a0505;
      color: #ff4d4d;
      padding: 30px;
      border: 1px solid #ff4d4d;
      border-radius: 12px;
      font-family: monospace;
      overflow: auto;
    }
  </style>
  <script>
    window.TTR_VERSION = "2.0.1-fixed";
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('GLOBAL ERROR:', msg, url, lineNo, columnNo, error);
      const errDisplay = document.getElementById('error-display');
      if (errDisplay) {
        errDisplay.style.display = 'block';
        errDisplay.style.background = '#0a0a0f';
        errDisplay.style.border = '2px solid #6C63FF';
        errDisplay.innerHTML = `
          <div style="color: #6C63FF; margin-bottom: 20px;">
            <h2 style="margin: 0;">TTR AI Recovery</h2>
            <p style="font-size: 14px; opacity: 0.8;">An unexpected error occurred. We've detected a possible crash.</p>
          </div>
          <div style="background: rgba(255,0,0,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px;">
            <strong style="color: #ff4d4d;">Error Path:</strong> ${window.location.href}<br>
            <strong style="color: #ff4d4d;">Message:</strong> ${msg}<br>
            <strong style="color: #ff4d4d;">Source:</strong> ${url?.split('/').pop()}:${lineNo}
          </div>
          <div style="display: flex; gap: 10px;">
            <button onclick="location.reload()" style="flex: 1; background: #6C63FF; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">Reload Page</button>
            <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" style="flex: 1; background: #2a2a3d; border: 1px solid #444; color: #ccc; padding: 12px; border-radius: 8px; cursor: pointer;">Clear Cache & Reset</button>
          </div>
          <p style="margin-top: 20px; font-size: 11px; text-align: center; color: #555;">TTR-AI-Supabase Engine v2.0.1</p>
        `;
      }
      return false;
    };
    window.onunhandledrejection = function(event) {
      console.error('UNHANDLED REJECTION:', event.reason);
      // Optional: trigger the same UI
    };
  </script>

  <!-- Primary SEO Meta Tags -->

<body>
  <!-- Hidden SEO content for crawlers (not visible to users) -->
  <noscript>
    <h1>TTRAI - Together To Refine</h1>
    <p>TTRAI is an AI-powered educational learning platform. Together To Refine helps students master complex
      subjects through personalized AI tutoring, Gurukul Path learning, and smart study tools. Visit TTRAI to get
      started.</p>
  </noscript>
  <div id="root-loading">
    <div class="root-spinner"></div>
    <div id="loading-status">
      <p id="loading-text" style="margin: 0; font-weight: 500;">Loading TTRAI</p>
      <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.6; text-align: center;">Initializing Neural Engine...</p>
    </div>
    
    <div id="loading-actions" style="margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
      <div id="loading-timeout" style="display:none; text-align: center;">
        <p style="color: #6C63FF; font-size: 13px; margin-bottom: 10px;">Still waiting? You can try to enter directly.</p>
        <button onclick="document.getElementById('root-loading').remove()" style="background: #6C63FF; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);">Enter TTRAI Now</button>
      </div>
      
      <button id="reset-button" onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" style="display:none; background: transparent; border: 1px solid #333; color: #666; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;">Clear Local Data & Reload</button>
    </div>
  </div>
  <script>
    // 1. Show Bypass Button after 4 seconds
    setTimeout(() => {
      const actions = document.getElementById('loading-timeout');
      if (actions) actions.style.display = 'block';
    }, 4000);

    // 2. Show Reset Button after 8 seconds
    setTimeout(() => {
      const reset = document.getElementById('reset-button');
      if (reset) reset.style.display = 'block';
    }, 8000);

    // 3. ABSOLUTE FAILSAFE: Auto-remove loader after 12 seconds
    setTimeout(() => {
      const loader = document.getElementById('root-loading');
      if (loader && loader.style.opacity !== '0') {
        console.warn('Failsafe: Force removing loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    }, 12000);
  </script>
  <div id="error-display"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
