[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

# SPA — send all non-file routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
